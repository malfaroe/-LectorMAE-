<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Test Paginación LectorMAE</title>
<style>
  /* ── Harness UI ── */
  body { margin: 0; background: #1a1a1a; font-family: sans-serif; color: #eee; }
  #controls {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: #333; padding: 8px 12px; display: flex;
    align-items: center; gap: 10px; font-size: 14px;
  }
  #controls button {
    padding: 6px 14px; background: #555; color: #fff;
    border: none; border-radius: 4px; cursor: pointer;
  }
  #controls button:disabled { opacity: 0.4; }
  #status { flex: 1; text-align: center; color: #FFD740; font-weight: bold; }
  #drift-indicator {
    color: #FF5252; font-size: 12px; text-align: center;
    background: #2a2a2a; padding: 4px 8px; border-radius: 4px;
  }
  #frame-wrapper {
    position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
  }
  iframe {
    width: 100%; height: 100%; border: none;
  }
  /* ── PASS/FAIL log ── */
  #log {
    display: none; position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
    background: #111; overflow-y: auto; padding: 16px; font-size: 13px;
  }
  .pass { color: #4CAF50; } .fail { color: #F44336; }
</style>
</head>
<body>

<div id="controls">
  <button id="btnPrev" disabled>◀ Prev</button>
  <span id="status">Cargando...</span>
  <button id="btnNext" disabled>Next ▶</button>
  <div id="drift-indicator" title="scrollLeft real del contenedor. Debe ser exactamente page*ancho.">drift: --</div>
  <button onclick="runAutoTest()" style="background:#1565C0">Auto-test</button>
  <button onclick="toggleLog()">Log</button>
</div>
<div id="frame-wrapper"><iframe id="frame"></iframe></div>
<div id="log"></div>

<script>
// ── Mock del bridge Android ──────────────────────────────────────────────────
var currentPage = 0, totalPages = 1;

function makeAndroidMock(frameWindow) {
  frameWindow.Android = {
    onPageInfo: function(page, total) {
      currentPage = page;
      totalPages  = total;
      document.getElementById('status').textContent =
        'Página ' + (page+1) + ' / ' + total;
      document.getElementById('btnPrev').disabled = (page === 0);
      document.getElementById('btnNext').disabled = (page === total-1);

      // Drift check: scrollLeft debe ser exactamente page * ancho
      var el = frameWindow.document.getElementById('_lm_p');
      if (el) {
        var expected = page * Math.round(frameWindow._w || frameWindow.innerWidth);
        var actual   = Math.round(el.scrollLeft);
        var drift    = actual - expected;
        document.getElementById('drift-indicator').textContent =
          'drift: ' + (drift === 0 ? '✓ 0px' : '✗ ' + drift + 'px');
        document.getElementById('drift-indicator').style.color =
          drift === 0 ? '#4CAF50' : '#FF5252';
      }
    },
    onNextChapter: function() { alert('Fin del capítulo → siguiente'); },
    onPrevChapter: function() { alert('Inicio del capítulo → anterior'); }
  };
}

// ── HTML que inyecta el lector (igual que buildHtml) ─────────────────────────
var FONT_SIZE = 18;
var SAMPLE_TEXT = generateSampleText();

function buildHtml(initialPage) {
  var anchorJs = 'null';
  var ip = initialPage || 0;

  return `<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style id="_lm">
  html, body {
    margin:0 !important; padding:0 !important;
    width:100% !important; height:100% !important;
    overflow:hidden !important; background:#121212 !important;
  }
  body { color:#E0E0E0 !important; font-size:${FONT_SIZE}px !important;
         font-family:Georgia,serif !important; line-height:1.75 !important; }
  #_lm_p {
    height:100vh; box-sizing:border-box; padding:12px 16px;
    column-fill:auto; -webkit-column-fill:auto;
    overflow-x:hidden; overflow-y:hidden;
  }
  a        { color:#C8965A !important; }
  img      { max-width:100% !important; height:auto !important; }
  h1,h2,h3 { color:#FFFFFF !important; }
</style>
<script id="_lm_js">
  var _p=0,_t=1,_w=0;
  function _pg(){ return document.getElementById('_lm_p'); }
  function lmWrap(){
    var p=document.createElement('div'); p.id='_lm_p';
    while(document.body.firstChild) p.appendChild(document.body.firstChild);
    var m=document.createElement('span'); m.id='_lm_end'; p.appendChild(m);
    document.body.appendChild(p);
  }
  function lmApplyColumns(){
    _w = window.innerWidth;
    var colW = (_w - 32) + 'px';
    var el = _pg();
    el.style.setProperty('-webkit-column-width', colW, 'important');
    el.style.setProperty('column-width',         colW, 'important');
    el.style.setProperty('-webkit-column-gap',  '32px','important');
    el.style.setProperty('column-gap',          '32px','important');
  }
  function lmMeasure(){
    var el=_pg(); el.scrollLeft=0;
    window.scrollTo(0,0);
    var r=document.getElementById('_lm_end').getBoundingClientRect();
    _t=Math.max(1, Math.floor(r.left/_w)+1);
  }
  function lmGoPage(n){
    _p=Math.max(0,Math.min(n,_t-1));
    window.scrollTo(0,0);
    _pg().scrollLeft=_p*_w;
    Android.onPageInfo(_p,_t);
  }
  function lmInit(){
    lmWrap(); lmApplyColumns();
    setTimeout(function(){
      lmMeasure();
      var anchor=${anchorJs}, ip=${ip};
      var start=ip<0?_t-1:ip;
      if(anchor){
        var el=document.getElementById(anchor);
        if(el){ _pg().scrollLeft=0; window.scrollTo(0,0); start=Math.floor(el.getBoundingClientRect().left/_w); }
      }
      lmGoPage(start);
    }, 150);
  }
  function lmNext(){ if(_p<_t-1) lmGoPage(_p+1); else Android.onNextChapter(); }
  function lmPrev(){ if(_p>0) lmGoPage(_p-1); else Android.onPrevChapter(); }
  function lmGoToAnchor(id){
    var el=document.getElementById(id); if(!el) return;
    _pg().scrollLeft=0;
    window.scrollTo(0,0);
    lmGoPage(Math.floor(el.getBoundingClientRect().left/_w));
  }
  window.addEventListener('load', function(){ setTimeout(lmInit, 200); });
<\/script>
</head>
<body>${SAMPLE_TEXT}</body>
</html>`;
}

// ── Carga el iframe ──────────────────────────────────────────────────────────
function loadReader(initialPage) {
  var frame = document.getElementById('frame');
  frame.onload = function() {
    makeAndroidMock(frame.contentWindow);
  };
  var blob = new Blob([buildHtml(initialPage)], {type: 'text/html'});
  frame.src = URL.createObjectURL(blob);
}

document.getElementById('btnNext').addEventListener('click', function() {
  var fw = document.getElementById('frame').contentWindow;
  if (fw && fw.lmNext) fw.lmNext();
});
document.getElementById('btnPrev').addEventListener('click', function() {
  var fw = document.getElementById('frame').contentWindow;
  if (fw && fw.lmPrev) fw.lmPrev();
});

// ── Auto-test: recorre todas las páginas y verifica drift ────────────────────
var logLines = [];
function log(msg, pass) {
  logLines.push('<div class="' + (pass ? 'pass' : 'fail') + '">' + msg + '</div>');
}

async function runAutoTest() {
  logLines = [];
  document.getElementById('log').style.display = 'block';
  document.getElementById('log').innerHTML = '<b>Ejecutando auto-test...</b><br>';

  loadReader(0);
  await sleep(700);

  var fw = document.getElementById('frame').contentWindow;
  var total = totalPages;
  log('Total páginas detectadas: ' + total, total > 1);

  var allPass = true;
  for (var p = 0; p < total; p++) {
    fw.lmGoPage(p);
    await sleep(80);

    var el = fw.document.getElementById('_lm_p');
    var expected = p * Math.round(fw._w);
    var actual   = Math.round(el.scrollLeft);
    var drift    = actual - expected;
    var pass     = drift === 0;
    if (!pass) allPass = false;
    log('Página ' + (p+1) + ': scrollLeft=' + actual + ' esperado=' + expected +
        ' drift=' + drift + 'px ' + (pass ? '✓' : '✗'), pass);
  }

  // Volver al principio y re-verificar página 0
  fw.lmGoPage(0);
  await sleep(80);
  var el0 = fw.document.getElementById('_lm_p');
  var finalDrift = Math.round(el0.scrollLeft);
  var finalPass  = finalDrift === 0;
  if (!finalPass) allPass = false;
  log('Volver a página 1: scrollLeft=' + finalDrift + ' (debe ser 0) ' + (finalPass ? '✓' : '✗'), finalPass);

  log('', true);
  log(allPass ? '✅ TODOS LOS TESTS PASARON — seguro hacer push' :
                '❌ DRIFT DETECTADO — revisar antes de push', allPass);

  document.getElementById('log').innerHTML =
    '<b>Resultado auto-test</b><br>' + logLines.join('');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function toggleLog() {
  var l = document.getElementById('log');
  l.style.display = l.style.display === 'none' ? 'block' : 'none';
}

function generateSampleText() {
  var para = '<p>La literatura es el arte de descubrir algo extraordinario acerca de la gente ordinaria, y de decirlo con palabras ordinarias. Cada página es un universo nuevo, cada párrafo una ventana hacia mundos que aún no hemos explorado. El escritor crea realidades paralelas donde el lector puede vivir por un instante.</p>';
  var html = '<h1>Capítulo de prueba — Test de Paginación</h1>';
  for (var i = 0; i < 18; i++) html += para;
  html += '<p id="test-anchor" style="color:#FFD740">⚓ Anchor de prueba (página final)</p>';
  for (var j = 0; j < 4; j++) html += para;
  return html;
}

// Carga inicial
loadReader(0);
</script>
</body>
</html>
